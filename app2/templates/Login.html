<<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login | APNACLASSES</title>
    <style>
        :root {
            --background: #1a1a2e;
            --color: #ffffff;
            --primary-color: #0f3460;
            --error-bg: rgba(255, 76, 76, 0.2);
            --error-text: #ff4c4c;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--background);
            color: var(--color);
            letter-spacing: 1px;
            transition: background 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .form-container {
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem 2rem;
            z-index: 10;
            position: relative;
        }

        .illustration {
            position: absolute;
            top: -60px;
            right: -20px;
            width: 120px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Form Inputs */
        input {
            display: block;
            padding: 15px;
            width: 100%;
            margin-bottom: 1.5rem;
            color: white;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 20px rgba(15, 52, 96, 0.3);
            transform: translateY(-2px);
        }

        button {
            background: var(--primary-color);
            color: white;
            display: block;
            padding: 15px;
            border-radius: 12px;
            outline: none;
            border: none;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Decorations */
        .circle {
            width: 150px;
            height: 150px;
            background: var(--primary-color);
            border-radius: 50%;
            position: absolute;
            filter: blur(50px);
            opacity: 0.5;
            z-index: -1;
        }
        .circle-one { top: -50px; left: -50px; }
        .circle-two { bottom: -50px; right: -50px; }

        .register-forget {
            margin-top: 1.5rem;
            text-align: center;
        }
        .register-forget a {
            font-size: 0.75rem;
            opacity: 0.6;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }
        .register-forget a:hover { opacity: 1; color: var(--primary-color); }

        /* Error Message Styling */
        .msg-alert {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255, 76, 76, 0.3);
            font-weight: 600;
        }

        /* Theme Buttons */
        .theme-btn-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .theme-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .theme-btn:hover { transform: scale(1.3); }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="circle circle-one"></div>
        
        <div class="form-container">
            <img src="../static/assets/images/illustration.png" alt="" class="illustration" />
            
            <h1>Login</h1>
            <p class="subtitle">Welcome back to APNACLASSES</p>

            {% if msg %}
                <div class="msg-alert">
                    ⚠️ {{msg}}
                </div>
            {% endif %}

            <form method="post" action="http://127.0.0.1:8000/">
                {% csrf_token %}
                <input type="text" name="T1" placeholder="Username" required />
                <input type="password" name="T2" placeholder="Password" required />
                <button type="submit">LOGIN TO ACCOUNT</button>
            </form>

            <div class="register-forget">
                <a href="#">Forgot Password?</a>
            </div>
        </div>

        <div class="circle circle-two"></div>
    </div>

    <div class="theme-btn-container" id="theme-btns"></div>

    <script>
        const themes = [
            { bg: "#1A1A2E", prim: "#0F3460", txt: "#FFFFFF" },
            { bg: "#461220", prim: "#E94560", txt: "#FFFFFF" },
            { bg: "#192A51", prim: "#967AA1", txt: "#FFFFFF" },
            { bg: "#0f172a", prim: "#38bdf8", txt: "#FFFFFF" }, // Cyber Blue
            { bg: "#231F20", prim: "#BB4430", txt: "#FFFFFF" }
        ];

        const setTheme = (t) => {
            const root = document.querySelector(":root");
            root.style.setProperty("--background", t.bg);
            root.style.setProperty("--color", t.txt);
            root.style.setProperty("--primary-color", t.prim);
        };

        const container = document.getElementById("theme-btns");
        themes.forEach(t => {
            const btn = document.createElement("div");
            btn.className = "theme-btn";
            btn.style.background = t.prim;
            btn.onclick = () => setTheme(t);
            container.appendChild(btn);
        });
    </script>
</body>
</html>
