{% extends "AdminDash.html" %}
{% load static %}

{% block m1 %}
<style>
    /* Full Page Background */
    .error-container {
        height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f8fafc;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Glass Card Effect */
    .error-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        padding: 50px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        text-align: center;
        max-width: 500px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: transform 0.3s ease;
    }

    .error-card:hover {
        transform: translateY(-5px);
    }

    /* Animated Icon */
    .lock-icon {
        font-size: 80px;
        color: #ef4444; /* Red Color */
        margin-bottom: 20px;
        animation: shake 0.5s ease-in-out infinite alternate;
    }

    @keyframes shake {
        0% { transform: rotate(-5deg); }
        100% { transform: rotate(5deg); }
    }

    h1 {
        font-size: 2rem;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 15px;
    }

    p {
        color: #64748b;
        font-size: 1.1rem;
        margin-bottom: 30px;
        line-height: 1.6;
    }

    /* Modern Button */
    .login-btn {
        display: inline-block;
        background: #1e293b;
        color: #ffffff !important;
        padding: 14px 35px;
        border-radius: 12px;
        text-decoration: none !important;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(30, 41, 59, 0.2);
    }

    .login-btn:hover {
        background: #334155;
        transform: scale(1.05);
        box-shadow: 0 15px 30px rgba(30, 41, 59, 0.3);
    }

    .error-code {
        position: absolute;
        top: 20px;
        right: 30px;
        font-weight: 900;
        font-size: 5rem;
        color: #e2e8f0;
        z-index: -1;
        user-select: none;
    }
</style>

<div class="error-container">
    <div class="error-code">401</div>
    
    <div class="error-card">
        <div class="lock-icon">
            <i class="fas fa-user-shield"></i> 🛡️
        </div>

        <h1>Access Denied</h1>
        <p>Oops! You are not an authorized user to access this page. Please sign in with your credentials to continue.</p>
        
        <a href="http://127.0.0.1:8000//" class="login-btn">
            <i class="fas fa-sign-in-alt me-2"></i> Go to Login Page
        </a>
    </div>
</div>

{% endblock %}
