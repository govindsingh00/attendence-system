{% extends "AccountantDash.html" %}
{% load static %}

{% block m1 %}
<style>
    /* Page Layout */
    .upload-section {
        padding: 50px 20px;
        background-color: #f4f7f6;
        display: flex;
        justify-content: center;
        min-height: 85vh;
    }

    /* Card Styling */
    .photo-card {
        background: #ffffff;
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        width: 100%;
        max-width: 480px;
        text-align: center;
        border-top: 6px solid #28a745; /* Accountant Theme Green */
    }

    .photo-card h2 {
        font-weight: 800;
        color: #333;
        margin-bottom: 30px;
    }

    /* Photo Display */
    .current-photo-container {
        margin-bottom: 35px;
    }

    .old-photo-preview {
        width: 150px;
        height: 150px;
        border-radius: 50%; /* Rounded circle */
        object-fit: cover;
        border: 5px solid #e9ecef;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        margin-bottom: 15px;
    }

    .label-tag {
        display: block;
        font-size: 0.8rem;
        font-weight: 700;
        color: #6c757d;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
    }

    /* File Input Styling */
    .custom-file-upload {
        background: #f8f9fa;
        border: 2px dashed #ced4da;
        border-radius: 12px;
        padding: 25px 15px;
        margin-bottom: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .custom-file-upload:hover {
        border-color: #28a745;
        background: #f1f3f5;
    }

    input[type="file"] {
        font-size: 0.9rem;
        color: #495057;
    }

    /* Action Button */
    .btn-update {
        background: #28a745;
        color: white;
        border: none;
        padding: 14px 40px;
        border-radius: 10px;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
    }

    .btn-update:hover {
        background: #218838;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
    }
</style>

<div class="upload-section">
    <div class="photo-card shadow-lg">
        <h2>Update Student Photo</h2>

        {% if data %}
        {% for d in data %}
        <form method="post" action="http://127.0.0.1:8000/studentchngephoto1/" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="current-photo-container">
                <span class="label-tag">Current Profile</span>
                <img src="../media/{{d.photo}}" class="old-photo-preview" alt="Student Old Photo">
                
                <input type="hidden" name="IMG1" value="{{d.photo}}" />
                <input type="hidden" name="E1" value="{{d.email}}" />
            </div>

            <div class="custom-file-upload">
                <span class="label-tag">Select New Photo</span>
                <input type="file" name="F1" required />
            </div>

            <button type="submit" class="btn-update">
                Confirm & Upload Photo
            </button>
        </form>
        {% endfor %}
        {% endif %}
    </div>
</div>
{% endblock %}
