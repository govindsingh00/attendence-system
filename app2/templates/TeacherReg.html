{% extends "AdminDash.html" %}
{% load static %}

{% block m1 %}
<style>
    /* Main Layout */
    .reg-wrapper {
        padding: 40px 15px;
        background-color: #f8fafc;
        min-height: 100vh;
        display: flex;
        justify-content: center;
    }

    /* Professional Card */
    .reg-card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        padding: 40px;
        width: 100%;
        max-width: 900px;
        border-top: 6px solid #1a73e8; /* Admin Blue */
    }

    .reg-card h1 {
        font-weight: 800;
        color: #1e293b;
        font-size: 1.8rem;
        margin-bottom: 5px;
    }

    .reg-card p.subtitle {
        color: #64748b;
        margin-bottom: 30px;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 15px;
    }

    /* Form Styling Overrides */
    .form-group label {
        font-size: 0.75rem;
        font-weight: 800;
        color: #475569;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    .form-control {
        border-radius: 10px;
        padding: 12px 15px;
        border: 2px solid #f1f5f9;
        background-color: #f8fafc;
        font-weight: 600;
        color: #1e293b;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: #1a73e8;
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.1);
        outline: none;
    }

    /* Error Span Styling */
    span[id^="er"] {
        color: #ef4444;
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: 10px;
        text-transform: none;
    }

    /* Radio Buttons */
    .gender-box {
        padding: 10px 0;
        display: flex;
        gap: 20px;
        font-weight: 600;
        color: #475569;
    }

    /* Buttons */
    .btn-row {
        margin-top: 30px;
        display: flex;
        gap: 15px;
    }

    .btn-reg {
        padding: 14px 30px;
        border-radius: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s;
    }

    .btn-submit { background-color: #1a73e8; border: none; color: white; flex: 2; }
    .btn-submit:hover { background-color: #1557b0; transform: translateY(-2px); }
    
    .btn-reset { background-color: #f1f5f9; border: none; color: #64748b; flex: 1; }

    /* Success Message */
    .success-box {
        margin-top: 25px;
        padding: 20px;
        background: #ecfdf5;
        border-radius: 12px;
        text-align: center;
        border: 1px solid #d1fae5;
    }
</style>

<div class="reg-wrapper">
    <div class="reg-card">
        <h1>Teacher Registration</h1>
        <p class="subtitle">Enter professional and personal details to create a teacher account.</p>

        <form method="post" enctype="multipart/form-data" action="" onsubmit="return B()">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>First Name</label><span id="er1"></span>
                    <input type="text" id="txt1" name="t1" class="form-control" placeholder="e.g. John">
                </div>
                <div class="form-group col-md-6">
                    <label>Last Name</label><span id="er11"></span>
                    <input type="text" id="txt11" name="t2" class="form-control" placeholder="e.g. Doe">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-12">
                    <label>Assigned Course</label>
                    <select name="t3" class="form-control">
                        <option value="">-- Select Course --</option>
                        {% for c in courses %}
                            <option value="{{ c.cid }}">{{ c.crname }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Date of Birth</label>
                    <input type="date" name="t4" class="form-control">
                </div>
                <div class="form-group col-md-6">
                    <label>Gender</label>
                    <div class="gender-box">
                        <span><input type="radio" name="R1" value="Male"> Male</span>
                        <span><input type="radio" name="R1" value="Female"> Female</span>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Residential Address</label><span id="er2"></span>
                <input type="text" name="t5" class="form-control mb-2" id="txt2" placeholder="House No, Street, Landmark">
                <input type="text" name="t6" class="form-control" placeholder="Area / Locality">
            </div>

            <div class="form-row">
                <div class="form-group col-md-4">
                    <label>City</label><span id="er21"></span>
                    <input type="text" name="t7" class="form-control" id="txt21">
                </div>
                <div class="form-group col-md-4">
                    <label>State</label><span id="er22"></span>
                    <input type="text" name="t8" class="form-control" id="txt22">
                </div>
                <div class="form-group col-md-4">
                    <label>Pincode</label><span id="er23"></span>
                    <input type="text" name="t9" class="form-control" id="txt23">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Contact Number</label><span id="er3"></span>
                    <input type="text" name="t10" class="form-control" id="txt3" placeholder="+91 ...">
                </div>
                <div class="form-group col-md-6">
                    <label>Email Address</label><span id="er4"></span>
                    <input type="email" name="t11" class="form-control" id="txt4" placeholder="teacher@apnaclasses.com">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Security Password</label><span id="er5"></span>
                    <input name="t12" type="password" class="form-control" id="txt5" placeholder="••••••••">
                </div>
                <div class="form-group col-md-6">
                    <label>Confirm Password</label><span id="er6"></span>
                    <input type="password" name="t13" class="form-control" id="txt6" placeholder="••••••••">
                </div>
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" name="photo" class="form-control" style="padding-top: 8px;">
            </div>

            <div class="btn-row">
                <button type="reset" class="btn btn-reg btn-reset">Reset</button>
                <button type="submit" class="btn btn-reg btn-submit">Complete Registration</button>
            </div>
        </form>

        {% if msg %}
        <div class="success-box">
            <h3 style="color:#059669; font-weight: 800;">✅ {{msg}}</h3>
            <a href="/admin_home/" class="btn btn-link">Click here to Continue</a>
        </div>
        {% endif %}
    </div>
</div>

<script>
    function B() {
        var t1 = document.getElementById("txt1");
        var t3 = document.getElementById("txt3");
        var t4 = document.getElementById("txt4");
        var t5 = document.getElementById("txt5");
        var t6 = document.getElementById("txt6");

        var e1 = document.getElementById("er1");
        var e3 = document.getElementById("er3");
        var e4 = document.getElementById("er4");
        var e6 = document.getElementById("er6");

        // Clear previous errors
        [e1, e3, e4, e6].forEach(e => e.innerHTML = "");

        if(t1.value=="") { e1.innerHTML="Required"; return false; }
        if(t3.value=="") { e3.innerHTML="Required"; return false; }
        if(t4.value=="") { e4.innerHTML="Required"; return false; }
        if(t5.value != t6.value) { e6.innerHTML="Passwords Mismatch"; return false; }
        return true;
    }
</script>
{% endblock %}
