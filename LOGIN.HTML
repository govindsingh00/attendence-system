<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendPro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent:#6366f1; --accent-soft:#eef2ff; --accent-border:#c7d2fe;
  --text:#1a1d2e; --text2:#6b7280; --text3:#9ca3af;
  --border:#e8eaf0; --bg:#f5f6fa; --white:#ffffff;
  --shadow-md:0 4px 12px rgba(0,0,0,0.08),0 12px 32px rgba(0,0,0,0.06);
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg); min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
}

/* Background blobs */
.blob {
  position:fixed; border-radius:50%;
  filter:blur(60px); opacity:0.12; pointer-events:none;
}
.blob1 { width:400px; height:400px; background:#6366f1; top:-100px; left:-100px; }
.blob2 { width:300px; height:300px; background:#10b981; bottom:-80px; right:-80px; }

.login-layout {
  display:grid; grid-template-columns:1fr 1fr;
  width:100%; max-width:920px;
  background:var(--white);
  border-radius:24px;
  box-shadow:var(--shadow-md);
  overflow:hidden;
  animation:fadeUp 0.5s ease both;
  position:relative; z-index:1;
  min-height:560px;
  margin:24px;
}

/* Left panel */
.login-left {
  background:linear-gradient(135deg, #6366f1 0%, #818cf8 50%, #4f46e5 100%);
  padding:48px 40px;
  display:flex; flex-direction:column;
  justify-content:space-between;
  position:relative; overflow:hidden;
}
/* Fixed embedded background pattern on the left side */
.login-left::before {
  content:''; position:absolute; inset:0; opacity:0.06;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.left-top {}
.left-logo { display:flex; align-items:center; gap:10px; margin-bottom:48px; position:relative; z-index:2; }
.left-logo-mark {
  width:40px; height:40px; background:rgba(255,255,255,0.2);
  border-radius:10px; display:flex; align-items:center; justify-content:center;
  border:1px solid rgba(255,255,255,0.3);
}
.left-logo-mark svg { width:20px; height:20px; stroke:#fff; fill:none; stroke-width:2.2; }
.left-logo-text { font-family:'Fraunces',serif; font-size:20px; font-weight:700; color:#fff; }

.left-headline { font-family:'Fraunces',serif; font-size:32px; font-weight:700; color:#fff; line-height:1.25; margin-bottom:14px; position:relative; z-index:2; }
.left-sub { font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; position:relative; z-index:2; }

.left-stats { display:flex; gap:20px; margin-top:40px; position:relative; z-index:2; }
.stat-box {
  background:rgba(255,255,255,0.15);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:12px; padding:14px 18px;
  backdrop-filter:blur(8px);
}
.stat-box .n { font-family:'Fraunces',serif; font-size:24px; font-weight:700; color:#fff; }
.stat-box .l { font-size:11px; color:rgba(255,255,255,0.65); margin-top:2px; }

/* Right panel */
.login-right { padding:48px 40px; display:flex; flex-direction:column; justify-content:center; }

.right-title {
  font-family:'Fraunces',serif;
  font-size:26px; font-weight:700; letter-spacing:-0.3px;
  color:var(--text); margin-bottom:6px;
}
.right-sub { font-size:13px; color:var(--text2); margin-bottom:32px; }

.form-group { margin-bottom:18px; }
.form-label { font-size:12px; font-weight:600; color:var(--text); margin-bottom:7px; display:block; }

.input-wrap {
  display:flex; align-items:center; gap:10px;
  border:1.5px solid var(--border);
  border-radius:12px; padding:11px 14px;
  background:var(--bg);
  transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.input-wrap:focus-within {
  border-color:var(--accent); background:var(--white);
  box-shadow:0 0 0 3px rgba(99,102,241,0.1);
}
.input-wrap svg { width:16px; height:16px; stroke:var(--text3); fill:none; stroke-width:2; flex-shrink:0; transition:stroke 0.2s; }
.input-wrap:focus-within svg { stroke:var(--accent); }
.input-wrap input {
  border:none; background:transparent; outline:none;
  font-size:13.5px; color:var(--text); flex:1;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.input-wrap input::placeholder { color:var(--text3); }

.form-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
.checkbox-label { display:flex; align-items:center; gap:7px; font-size:13px; color:var(--text2); cursor:pointer; }
.checkbox-label input { accent-color:var(--accent); width:14px; height:14px; }
.forgot { font-size:12px; color:var(--accent); cursor:pointer; font-weight:500; transition:opacity 0.15s; }
.forgot:hover { opacity:0.7; }

.btn-login {
  width:100%; padding:13px;
  background:var(--accent); color:#fff;
  border:none; border-radius:12px;
  font-size:14px; font-weight:600;
  font-family:'Plus Jakarta Sans',sans-serif;
  cursor:pointer; letter-spacing:0.2px;
  transition:transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s, background 0.2s;
  box-shadow:0 4px 14px rgba(99,102,241,0.35);
}
.btn-login:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(99,102,241,0.45); background:#4f46e5; }
.btn-login:active { transform:scale(0.98); }

.divider { display:flex; align-items:center; gap:12px; margin:22px 0; }
.divider-line { flex:1; height:1px; background:var(--border); }
.divider-text { font-size:11px; color:var(--text3); white-space:nowrap; }

.demo-btn {
  width:100%; padding:11px;
  background:var(--white); color:var(--text);
  border:1.5px solid var(--border);
  border-radius:12px; font-size:13px; font-weight:500;
  font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer;
  transition:all 0.2s;
}
.demo-btn:hover { border-color:var(--accent-border); background:var(--accent-soft); color:var(--accent); }

.signup-row { text-align:center; margin-top:20px; font-size:12px; color:var(--text3); }
.signup-row a { color:var(--accent); font-weight:600; text-decoration:none; }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:700px) {
  .login-layout { grid-template-columns:1fr; }
  .login-left { display:none; }
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="login-layout">
  <div class="login-left">
    <div class="left-top">
      <div class="left-logo">
        <div class="left-logo-mark">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
        </div>
        <div class="left-logo-text">AttendPro</div>
      </div>
      <div class="left-headline">Smart Attendance<br>Management</div>
      <div class="left-sub">Track your company's attendance — easily, accurately, and in real-time.</div>
    </div>
    <div class="left-stats">
      <div class="stat-box"><div class="n">248</div><div class="l">Employees</div></div>
      <div class="stat-box"><div class="n">98%</div><div class="l">Uptime</div></div>
      <div class="stat-box"><div class="n">5+</div><div class="l">Departments</div></div>
    </div>
  </div>

  <div class="login-right">
    <div class="right-title">Welcome back!</div>
    <div class="right-sub">Login to your account</div>

    <div class="form-group">
      <label class="form-label">Email or Employee ID</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" placeholder="admin@attendpro.com">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" placeholder="••••••••">
      </div>
    </div>

    <div class="form-row">
      <label class="checkbox-label">
        <input type="checkbox" checked> Remember me
      </label>
      <span class="forgot">Forgot password?</span>
    </div>

    <button class="btn-login" onclick="window.location.href='home.html'">Login</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or try demo</div>
      <div class="divider-line"></div>
    </div>

    <button class="demo-btn" onclick="window.location.href='home.html'">Login with Demo account</button>

    <div class="signup-row">New account? <a href="#">Contact Admin</a></div>
  </div>
</div>
</body>
</html>
