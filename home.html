<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendPro — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.hero-banner {
  /* Yahan maine live professional image daal di hai */
  background: linear-gradient(rgba(79, 70, 229, 0.8), rgba(99, 102, 241, 0.7)), 
              url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1200');
  background-size: cover;
  background-position: center;
  border-radius: var(--radius); padding: 50px 40px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px; position: relative; overflow: hidden;
  box-shadow: 0 10px 30px rgba(99,102,241,0.25);
  color: #fff; animation: fadeUp 0.5s ease both;
}

.hero-content { position: relative; z-index: 2; }
.hero-title { font-family: 'Fraunces', serif; font-size: 38px; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
.hero-sub { opacity: 0.95; font-size: 16px; max-width: 550px; font-weight: 500; }

.main-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
.quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
.quick-card { 
    background: #fff; padding: 25px; border-radius: var(--radius); 
    text-align: center; text-decoration: none; border: 1px solid var(--border);
    transition: 0.3s; box-shadow: var(--shadow);
}
.quick-card:hover { transform: translateY(-5px); border-color: var(--accent); }
.qa-icon { font-size: 28px; margin-bottom: 10px; display: block; }
</style>
</head>
<body>
<div class="main">
  <div class="topbar">
    <div class="page-title-wrap"><div class="page-name">Home</div><div class="breadcrumb">AttendPro / Home</div></div>
    <div class="avatar-btn">AD</div>
  </div>

  <div class="page-body">
    <div class="hero-banner">
      <div class="hero-content">
        <h1 class="hero-title">Welcome Back, Admin</h1>
        <p class="hero-sub">Manage your workforce and track attendance efficiently with AttendPro's smart dashboard.</p>
      </div>
    </div>

    <div class="main-layout">
      <div>
        <div class="quick-grid">
          <a href="employees.html" class="quick-card">
            <span class="qa-icon">👥</span>
            <div style="font-weight:700; color:var(--text)">Employees</div>
          </a>
          <a href="dashboard.html" class="quick-card">
            <span class="qa-icon">📊</span>
            <div style="font-weight:700; color:var(--text)">Analytics</div>
          </a>
          <a href="reports.html" class="quick-card">
            <span class="qa-icon">📄</span>
            <div style="font-weight:700; color:var(--text)">Reports</div>
          </a>
        </div>
        <div class="panel">
            <div class="panel-title">Live Activity</div>
            <div id="activityFeed" style="margin-top:15px;"></div>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-title">Summary</div>
        <div style="margin-top:20px; text-align:center;">
            <div style="font-size:48px; font-weight:800; color:var(--accent);">211</div>
            <div style="color:var(--text2); font-size:14px;">Present Today</div>
            <hr style="margin:20px 0; border:none; border-top:1px solid var(--border);">
            <div style="font-size:24px; font-weight:700; color:var(--red);">28</div>
            <div style="color:var(--text2); font-size:14px;">Absent Today</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
renderSidebar('home');
const acts = [
    {n:'Rahul Patel', t:'09:00 AM', st:'Present'},
    {n:'Simran Arora', t:'09:15 AM', st:'Present'},
    {n:'Mohit Kapoor', t:'09:45 AM', st:'Late'}
];
document.getElementById('activityFeed').innerHTML = acts.map(a => `
    <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--border);">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:35px; height:35px; background:var(--accent-soft); color:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px;">${a.n.charAt(0)}</div>
            <span style="font-weight:600;">${a.n}</span>
        </div>
        <span class="badge ${a.st==='Late'?'b-late':'b-present'}">${a.st}</span>
    </div>
`).join('');
</script>
</body>
</html>
